<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternally - Guests</title>
    <link rel="shortcut icon" href="https://via.placeholder.com/32" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>

    <header class="dashboard_header">
        <div class="header_left">
            <button id="menu_toggle" class="menu_toggle"><i class="bi bi-list"></i></button>
            <a href="dashoboard.html" class="logo_link"><i class="bi bi-suit-heart-fill"></i><span class="logo_text">Eternally</span></a>
        </div>
        <div class="header_actions">
            <button class="btn_light"><i class="bi bi-plus-lg"></i><span class="d-none d-sm-inline">Create Invitation</span></button>
            <button class="btn_outline"><i class="bi bi-box-arrow-right"></i><span>Logout</span></button>
        </div>
    </header>

    <div class="dashboard_wrapper">
        <aside id="side_bar" class="side_bar">
            <div class="user_info">
                <div class="user_label">Logged in as</div>
                <div class="user_name">amir</div>
            </div>
            <ul class="nav_menu">
                <li class="nav_item"><a href="dashoboard.html" class="nav_link"><i class="bi bi-grid-1x2"></i> Overview</a></li>
                <li class="nav_item"><a href="invitation-screen.html" class="nav_link"><i class="bi bi-file-earmark-text"></i> Edit Invitation</a></li>

                <li class="nav_item"><a href="settings.html" class="nav_link"><i class="bi bi-gear"></i> Settings</a></li>
            </ul>
        </aside>

        <main class="main_content d-flex align-items-center">
            <canvas id="animation_canvas"></canvas>
            <div class="content_inner w-100" data-aos="fade-in">
                <div class="welcome_icon"><i class="bi bi-people"></i></div>
                <h1 class="welcome_title">No Events Yet</h1>
                <p class="welcome_subtitle mb-4">Create your first wedding invitation to start managing guests.</p>
                <button class="btn_primary_large"><i class="bi bi-suit-heart"></i> Create Your First Invitation</button>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/assets/js/dashboard.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>
