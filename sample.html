<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="meta_title">Eternally - Digital Wedding Invitations</title>
    <link rel="shortcut icon" href="assets/imgs/logo.svg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<style>
    /* ==================== HERO ANIMATION SEQUENCE ==================== */
.hero_bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    /* Floral arch background */
    background: url(/assets/imgs/tem1.png) center/cover;
    z-index: 1;
}
.t_hero {
    height: 100vh;
    overflow: hidden;
    position: relative;
    background-color: var(--bg-main);
}


    /* 1. Hide Background Initially */
    .custom-seq-bg {
        opacity: 0;
        transition: opacity 1.5s ease-in-out;
    }

    .custom-seq-bg.show-bg {
        opacity: 1;
    }

    /* 2. Hide Text Initially */
    .custom-reveal {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
        transition: opacity 1.2s cubic-bezier(0.25, 0.8, 0.25, 1), transform 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .custom-reveal.show-text {
        opacity: 1;
        transform: translateY(0) scale(1);
    }

    /* 3. Car Animation Styles */
    .wedding-car-container {
        position: absolute;
        left: 50%;
        bottom: -150px;
        /* Start off-screen bottom */
        transform: translateX(-50%);
        z-index: 10;
        color: var(--text-dark);
        font-size: 5rem;
        opacity: 0;
    }

    .wedding-car-container .float-heart {
        color: var(--accent);
        font-size: 1.5rem;
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0;
    }

    .drive-animation {
        animation: driveCar 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .drive-animation .float-heart {
        animation: popHeart 3.5s ease-in-out forwards;
    }

    /* Car drives up, pauses, drives off */
    @keyframes driveCar {
        0% {
            bottom: -150px;
            opacity: 0;
            transform: translateX(-50%) scale(0.8);
        }

        20% {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        45% {
            bottom: 45%;
            transform: translateX(-50%) scale(1.3);
        }

        /* Pause center */
        55% {
            bottom: 45%;
            transform: translateX(-50%) scale(1.3);
        }

        80% {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        100% {
            bottom: 120%;
            opacity: 0;
            transform: translateX(-50%) scale(0.8);
        }

        /* Exit top */
    }

    @keyframes popHeart {

        0%,
        40% {
            opacity: 0;
            transform: translate(-50%, 10px) scale(0);
        }

        45%,
        55% {
            opacity: 1;
            transform: translate(-50%, -10px) scale(1.2);
        }

        60%,
        100% {
            opacity: 0;
            transform: translate(-50%, -30px) scale(0);
        }
    }
</style>

<body>

    <section class="t_hero d-flex flex-column position-relative">
        <div class="hero_bg custom-seq-bg"></div>
        <div class="hero_overlay custom-seq-bg"></div>
        
        <div id="wedding_car_animation" class="wedding-car-container text-center">
            <i class="bi bi-suit-heart-fill float-heart"></i>
            <i class="bi bi-car-front-fill d-block"></i>
        </div>

        <canvas id="white_flower_canvas"></canvas>
        
        <div class="hero_content_wrapper custom-reveal d-flex flex-column justify-content-center align-items-center flex-grow-1">
            <div class="hero_icon mb-2"><i class="bi bi-suit-heart-fill"></i></div>
            <h1 class="hero_names serif text-center px-3">Lily & James</h1>
            <p class="hero_subtitle serif">Are getting married!</p>
        </div>

        <div class="pb-5 z-index-4 position-relative text-center custom-reveal hero-countdown">
            <h2 class="serif mb-3" style="color: var(--accent); font-size: 2.2rem;">Counting Down...</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;" class="mb-4">Sunday, April 19, 2026</p>
            
            <div class="d-flex justify-content-center gap-3">
                <div class="cd_box d-flex flex-column justify-content-center align-items-center"><span class="cd_num serif" id="cd_days">00</span><span class="cd_label">Days</span></div>
                <div class="cd_box d-flex flex-column justify-content-center align-items-center"><span class="cd_num serif" id="cd_hours">00</span><span class="cd_label">Hours</span></div>
                <div class="cd_box d-flex flex-column justify-content-center align-items-center"><span class="cd_num serif" id="cd_minutes">00</span><span class="cd_label">Mins</span></div>
                <div class="cd_box d-flex flex-column justify-content-center align-items-center"><span class="cd_num serif" id="cd_seconds">00</span><span class="cd_label">Secs</span></div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>


    <script>
        document.addEventListener("DOMContentLoaded", () => {

            // ==========================================
            // 0. HERO INTRO SEQUENCE
            // ==========================================
            const carAnim = document.getElementById("wedding_car_animation");
            const revealElements = document.querySelectorAll(".custom-reveal");
            const bgElements = document.querySelectorAll(".custom-seq-bg");

            if (carAnim) {
                // 1. Trigger the car animation immediately on load
                carAnim.classList.add("drive-animation");

                // 2. Listen for when the car finishes its journey
                carAnim.addEventListener("animationend", (e) => {
                    // Ensure we only trigger once the main car animation ends (not the heart)
                    if (e.animationName === "driveCar") {

                        // 3. Show Text & Countdown
                        revealElements.forEach(el => el.classList.add("show-text"));

                        // 4. Show Background Image shortly after the text appears
                        setTimeout(() => {
                            bgElements.forEach(bg => bg.classList.add("show-bg"));
                        }, 800); // 800ms delay after text
                    }
                });
            }

            // ==========================================
            // 1. CINEMATIC WHITE FLOWER SHOWER
            // ==========================================
            const canvas = document.getElementById("white_flower_canvas");
            if (canvas) {
                const ctx = canvas.getContext("2d");
                let petals = [];

                // --- Configuration ---
                const INITIAL_BURST_COUNT = 800; // Massive opening
                const SUSTAINED_COUNT = 100;     // Gentle endless background shower

                let phase = 1;
                let pileOpacity = 1;

                // --- The "Pile" Canvas ---
                const pileCanvas = document.createElement('canvas');
                const pileCtx = pileCanvas.getContext('2d');
                let pileHeightOffset = 0;
                let settledCount = 0;

                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    pileCanvas.width = window.innerWidth;
                    pileCanvas.height = window.innerHeight;
                    pileHeightOffset = 0;
                    settledCount = 0;
                }
                window.addEventListener("resize", resizeCanvas);
                resizeCanvas();

                // --- PRE-RENDER THE WHITE BLOSSOM SHAPE ---
                const shapeCanvas = document.createElement('canvas');
                shapeCanvas.width = 40;
                shapeCanvas.height = 40;
                const sCtx = shapeCanvas.getContext('2d');

                sCtx.translate(20, 20);

                // Soft drop shadow for depth against the light background
                sCtx.shadowBlur = 4;
                sCtx.shadowColor = 'rgba(0, 0, 0, 0.1)';

                // Draw 5 white petals
                sCtx.fillStyle = '#ffffff';
                for (let i = 0; i < 5; i++) {
                    sCtx.rotate((Math.PI * 2) / 5);
                    sCtx.beginPath();
                    // Elegant, slightly elongated petal shape
                    sCtx.ellipse(0, -8, 5, 10, 0, 0, Math.PI * 2);
                    sCtx.fill();
                }

                // Draw soft golden center
                sCtx.shadowBlur = 0;
                sCtx.fillStyle = '#e8c872';
                sCtx.beginPath();
                sCtx.arc(0, 0, 4, 0, Math.PI * 2);
                sCtx.fill();

                // --- Particle Class ---
                class WhiteFlower {
                    constructor() {
                        this.reset(true);
                    }

                    reset(initial = false) {
                        this.x = Math.random() * canvas.width;
                        this.y = initial ? -(Math.random() * canvas.height * 1.5) : -50;
                        this.baseSize = Math.random() * 0.4 + 0.3; // Slightly larger for visibility
                        this.scale = this.baseSize;

                        this.speedY = Math.random() * 2 + 1.2;
                        this.speedX = Math.random() * 1 - 0.5;

                        this.angle = Math.random() * Math.PI * 2;
                        this.rotationSpeed = (Math.random() - 0.5) * 0.04;
                        this.sway = Math.random() * Math.PI * 2;
                        this.swaySpeed = Math.random() * 0.03 + 0.01;

                        this.settleTarget = canvas.height - (Math.random() * 50) - pileHeightOffset;
                    }

                    update(index) {
                        this.y += this.speedY;
                        this.x += this.speedX + Math.sin(this.sway) * 1.2; // Wider sway for floating effect
                        this.sway += this.swaySpeed;
                        this.angle += this.rotationSpeed;

                        if (this.y >= this.settleTarget) {

                            if (phase === 1) {
                                pileCtx.save();
                                pileCtx.translate(this.x, this.y);
                                pileCtx.rotate(this.angle);
                                pileCtx.scale(this.scale, this.scale);
                                pileCtx.drawImage(shapeCanvas, -20, -20);
                                pileCtx.restore();

                                settledCount++;
                                if (settledCount % 15 === 0 && pileHeightOffset < canvas.height * 0.20) {
                                    pileHeightOffset += 1.5;
                                }
                            }

                            if (phase === 2 && petals.length > SUSTAINED_COUNT) {
                                petals.splice(index, 1);
                            } else {
                                this.reset();
                            }
                        }
                    }

                    draw() {
                        ctx.save();
                        ctx.translate(this.x, this.y);
                        ctx.rotate(this.angle);
                        ctx.scale(this.scale, this.scale);
                        ctx.drawImage(shapeCanvas, -20, -20);
                        ctx.restore();
                    }
                }

                function init() {
                    petals = [];
                    for (let i = 0; i < INITIAL_BURST_COUNT; i++) {
                        petals.push(new WhiteFlower());
                    }
                }

                function triggerPhaseTwo() {
                    if (phase === 1) phase = 2;
                }

                setTimeout(triggerPhaseTwo, 8000);
                window.addEventListener("scroll", () => {
                    if (window.scrollY > 150) triggerPhaseTwo();
                });

                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    if (phase === 2 && pileOpacity > 0) {
                        pileOpacity -= 0.005;
                        if (pileOpacity < 0) pileOpacity = 0;
                    }

                    if (pileOpacity > 0) {
                        ctx.globalAlpha = pileOpacity;
                        ctx.drawImage(pileCanvas, 0, 0);
                    }

                    ctx.globalAlpha = 1;

                    for (let i = petals.length - 1; i >= 0; i--) {
                        petals[i].update(i);
                        if (petals[i]) petals[i].draw();
                    }

                    requestAnimationFrame(animate);
                }

                init();
                animate();
            }

        });
    </script>


</body>

</html>
