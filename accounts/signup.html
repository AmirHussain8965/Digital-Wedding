<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternally - Sign Up</title>
    <link rel="shortcut icon" href="https://via.placeholder.com/32" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/accounts.css">
</head>
<body>

    <header class="top_nav">
        <a href="/index.html" class="nav_link">
            <i class="bi bi-arrow-left"></i>
            <i class="bi bi-suit-heart-fill"></i>
            <span class="logo_text">Eternally</span>
        </a>
    </header>

    <main class="container auth_wrapper">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 col-xl-5">
                <div class="auth_card" data-aos="fade-up">
                    <div class="icon_circle">
                        <i class="bi bi-person-plus"></i>
                    </div>
                    
                    <h1 class="auth_title">Create Account</h1>
                    <p class="auth_subtitle">Start creating beautiful invitations today</p>

                    <form action="#">
                        <div class="form_group">
                            <label class="form_label" for="fullname">Full Name</label>
                            <input type="text" id="fullname" class="form_input" placeholder="John Doe" required>
                        </div>

                        <div class="form_group">
                            <label class="form_label" for="email">Email</label>
                            <input type="email" id="email" class="form_input" placeholder="you@example.com" required>
                        </div>
                        
                        <div class="form_group">
                            <label class="form_label" for="password">Password</label>
                            <input type="password" id="password" class="form_input" placeholder="••••••••" required>
                        </div>

                        <div class="form_group">
                            <label class="form_label" for="confirm_password">Confirm Password</label>
                            <input type="password" id="confirm_password" class="form_input" placeholder="••••••••" required>
                        </div>

                        <div class="check_group">
                            <input type="checkbox" id="terms" required>
                            <label for="terms">I agree to the <a href="#" class="custom_link">Terms and Conditions</a> and <a href="#" class="custom_link">Privacy Policy.</a></label>
                        </div>

                        <button type="submit" class="primary_btn">Create Account</button>
                    </form>

                    <div class="auth_footer">
                        Already have an account? <a href="signin.html" class="custom_link">Sign in</a>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/assets/js/accounts.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
